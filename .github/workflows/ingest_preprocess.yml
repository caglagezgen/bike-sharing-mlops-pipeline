name: Ingest and Preprocess

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      competition:
        description: "Bike Sharing Demand Prediction"
        required: false
        default: bike-sharing-demand
  workflow_call:
    inputs:
      competition:
        required: false
        type: string
        default: bike-sharing-demand

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest_preprocess:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download data
        env:
          PYTHONPATH: ${{ github.workspace }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          COMPETITION: ${{ inputs.competition || 'bike-sharing-demand' }}
        run: |
          python -m src.data.ingest --competition "$COMPETITION"
      - name: Validate downloaded data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.data.validate --path data/raw/train.csv
      - name: Track raw data with DVC
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          printf '%s' "$GCP_SA_KEY" > /tmp/gcp-creds.json
          dvc remote modify --local gcs-remote credentialpath /tmp/gcp-creds.json
          dvc add data/raw/train.csv data/raw/test.csv
          dvc push
          rm -f /tmp/gcp-creds.json
      - name: Commit DVC pointer files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/train.csv.dvc data/raw/test.csv.dvc .gitignore
          git diff --cached --quiet || git commit -m "chore: update DVC pointers for raw data [skip ci]"
          git push
      - name: Preprocess data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m src.data.preprocess
      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: |
            data/processed
            artifacts/feature_config.json
            artifacts/dataset_meta.json
            artifacts/data_profile.json
