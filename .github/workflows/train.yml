name: Train Model

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: train
  cancel-in-progress: false

jobs:
  ingest_preprocess:
    uses: ./.github/workflows/ingest_preprocess.yml
    secrets: inherit

  train:
    runs-on: ubuntu-22.04
    needs: ingest_preprocess
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: .
      - name: Download previous model artifacts
        continue-on-error: true   # first-ever run has no prior artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: train.yml
          workflow_conclusion: success
          name: model-artifacts
          path: artifacts
      - name: Save baseline metrics
        run: |
          cp artifacts/metrics.json /tmp/baseline_metrics.json 2>/dev/null \
            || echo '{"val_rmsle": 9999}' > /tmp/baseline_metrics.json
      - name: Train model
        env:
          MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns
          PYTHONPATH: ${{ github.workspace }}
          MODEL_STAGE: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
        run: |
          python -m src.models.train --stage "$MODEL_STAGE"
      - name: Quality gate (champion vs challenger)
        run: |
          python - <<'EOF'
          import json, sys
          new  = json.load(open("artifacts/metrics.json"))["val_rmsle"]
          base = json.load(open("/tmp/baseline_metrics.json"))["val_rmsle"]
          print(f"Challenger RMSLE: {new:.4f}  |  Champion RMSLE: {base:.4f}")
          if new > base * 1.05:
              print("FAIL: challenger regressed >5% vs champion — blocking deployment")
              sys.exit(1)
          print("PASS: challenger accepted")
          EOF
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            artifacts/model
            artifacts/metrics.json
            artifacts/model_meta.json
            artifacts/model_versions.json
            artifacts/model_registry.json
            artifacts/dataset_meta.json
            artifacts/data_profile.json
            artifacts/shap_importance.json
            artifacts/shap_importance.png
