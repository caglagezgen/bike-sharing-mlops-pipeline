name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_REGION: ${{ secrets.GAR_REGION }}
  GAR_REPOSITORY: ${{ secrets.GAR_REPOSITORY }}
  IMAGE_NAME: ${{ github.event.repository.name }}

permissions:
  actions: read
  contents: read

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Training workflow run id to deploy"
        required: true
  workflow_run:
    workflows: ["Train Model", "Continuous Training"]
    types: [completed]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    outputs:
      image_ref: ${{ steps.set-image.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Download model artifacts
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id || github.event.inputs.run_id }}
          name: model-artifacts
          path: artifacts
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGION }}-docker.pkg.dev --quiet
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute image URI
        id: compute-uri
        run: |
          IMAGE_URI="${{ env.GAR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
      - name: Set image URI output
        id: set-image
        run: echo "image_ref=${{ steps.compute-uri.outputs.image_uri }}:${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.compute-uri.outputs.image_uri }}:latest
            ${{ steps.compute-uri.outputs.image_uri }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: [self-hosted, kind, gcp]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to cluster
        env:
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
        run: |
          IMAGE_REF="$IMAGE_REF" envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
      - name: Verify rollout
        run: |
          if ! kubectl rollout status deployment/bike-sharing-api --timeout=120s; then
            echo "Rollout failed — initiating rollback"
            kubectl rollout undo deployment/bike-sharing-api
            kubectl rollout status deployment/bike-sharing-api --timeout=60s
            exit 1
          fi
      - name: Smoke test
        run: |
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          echo "Smoke testing http://${NODE_IP}:30080/ready"
          curl --retry 6 --retry-delay 5 --retry-all-errors --fail \
               "http://${NODE_IP}:30080/ready"
          echo "Smoke test passed"
