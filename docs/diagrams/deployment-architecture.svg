<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <defs>
    <style>
      .box { fill: #f3f7fb; stroke: #9bb0c1; stroke-width: 1.5; }
      .label { font: 14px Arial, sans-serif; fill: #1f2a37; text-anchor: middle; }
      .small { font: 12px Arial, sans-serif; fill: #1f2a37; text-anchor: middle; }
      .arrow { stroke: #7f97ab; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f97ab" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fbff" />

  <rect class="box" x="320" y="30" width="260" height="60" rx="8" />
  <text class="label" x="450" y="65">Developer</text>

  <rect class="box" x="320" y="110" width="260" height="60" rx="8" />
  <text class="label" x="450" y="145">GitHub Actions</text>

  <rect class="box" x="320" y="190" width="260" height="60" rx="8" />
  <text class="label" x="450" y="225">Artifact Registry</text>

  <rect class="box" x="320" y="270" width="260" height="60" rx="8" />
  <text class="label" x="450" y="300">Kind Cluster</text>
  <text class="small" x="450" y="318">GCP VM</text>

  <rect class="box" x="320" y="350" width="260" height="60" rx="8" />
  <text class="label" x="450" y="385">NodePort Service :30080</text>

  <rect class="box" x="320" y="430" width="260" height="60" rx="8" />
  <text class="label" x="450" y="462">FastAPI App</text>
  <text class="small" x="450" y="480">/health /ready /predict</text>

  <rect class="box" x="620" y="430" width="230" height="60" rx="8" />
  <text class="label" x="735" y="462">Model Artifacts</text>
  <text class="small" x="735" y="480">artifacts/model</text>

  <line class="arrow" x1="450" y1="90" x2="450" y2="110" />
  <line class="arrow" x1="450" y1="170" x2="450" y2="190" />
  <line class="arrow" x1="450" y1="250" x2="450" y2="270" />
  <line class="arrow" x1="450" y1="330" x2="450" y2="350" />
  <line class="arrow" x1="450" y1="410" x2="450" y2="430" />
  <line class="arrow" x1="620" y1="460" x2="580" y2="460" />
</svg>
