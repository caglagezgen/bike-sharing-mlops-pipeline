<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360">
  <defs>
    <style>
      .box { fill: #f3f7fb; stroke: #9bb0c1; stroke-width: 1.5; }
      .label { font: 14px Arial, sans-serif; fill: #1f2a37; text-anchor: middle; }
      .small { font: 12px Arial, sans-serif; fill: #1f2a37; text-anchor: middle; }
      .arrow { stroke: #7f97ab; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7f97ab" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#f8fbff" />

  <!-- Main pipeline row -->
  <rect class="box" x="40" y="60" width="190" height="70" rx="8" />
  <text class="label" x="135" y="90">Kaggle Dataset</text>

  <rect class="box" x="250" y="60" width="190" height="70" rx="8" />
  <text class="label" x="345" y="85">Ingest + Preprocess</text>
  <text class="small" x="345" y="105">ingest_preprocess.yml (DVC/GCS)</text>

  <rect class="box" x="460" y="60" width="190" height="70" rx="8" />
  <text class="label" x="555" y="90">Processed Data</text>
  <text class="small" x="555" y="110">artifacts/</text>

  <rect class="box" x="670" y="60" width="190" height="70" rx="8" />
  <text class="label" x="765" y="85">Train Model</text>
  <text class="small" x="765" y="105">train.yml (MLflow + artifacts)</text>

  <rect class="box" x="880" y="60" width="190" height="70" rx="8" />
  <text class="label" x="975" y="90">Deploy</text>
  <text class="small" x="975" y="110">deploy.yml</text>

  <rect class="box" x="1090" y="60" width="190" height="70" rx="8" />
  <text class="label" x="1185" y="90">Kind on GCP VM</text>

  <!-- Monitoring and CT row -->
  <rect class="box" x="460" y="200" width="190" height="70" rx="8" />
  <text class="label" x="555" y="225">Continuous Monitoring</text>
  <text class="small" x="555" y="245">monitor.yml</text>

  <rect class="box" x="670" y="200" width="190" height="70" rx="8" />
  <text class="label" x="765" y="225">Continuous Training</text>
  <text class="small" x="765" y="245">ct.yml</text>

  <!-- Main flow arrows -->
  <line class="arrow" x1="230" y1="95" x2="250" y2="95" />
  <line class="arrow" x1="440" y1="95" x2="460" y2="95" />
  <line class="arrow" x1="650" y1="95" x2="670" y2="95" />
  <line class="arrow" x1="860" y1="95" x2="880" y2="95" />
  <line class="arrow" x1="1070" y1="95" x2="1090" y2="95" />

  <!-- Monitoring and CT loop -->
  <line class="arrow" x1="555" y1="130" x2="555" y2="200" />
  <line class="arrow" x1="650" y1="235" x2="670" y2="235" />
  <line class="arrow" x1="765" y1="200" x2="765" y2="130" />
</svg>
