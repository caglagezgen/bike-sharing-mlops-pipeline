apiVersion: apps/v1
kind: Deployment
metadata:
  name: bike-sharing-api
  labels:
    app: bike-sharing-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bike-sharing-api
  template:
    metadata:
      labels:
        app: bike-sharing-api
    spec:
      containers:
        - name: api
          image: ${IMAGE_REF}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_PATH
              value: /app/artifacts/model/model.joblib
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
      imagePullSecrets:
        - name: artifact-registry
